name: BillionCalc
options:
  bundleIdPrefix: com.westjh
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ko
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GCC_C_LANGUAGE_STANDARD: gnu17
    CLANG_ENABLE_OBJC_WEAK: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  BillionCalcCore:
    path: .

targets:
  BillionCalc:
    type: application
    platform: iOS
    sources:
      - path: App
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleDisplayName: "1억 계산기"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: false
        UIViewControllerBasedStatusBarAppearance: true
        NSHumanReadableCopyright: "© 2026 westjh"
    entitlements:
      path: App/Resources/BillionCalc.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.westjh.billion-calc
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.westjh.billion-calc
        PRODUCT_NAME: "BillionCalc"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: BillionCalcCore
        product: BillionCalcCore
      - target: BillionCalcWidget

  BillionCalcWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: "1억 계산기 위젯"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/BillionCalcWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.westjh.billion-calc
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.westjh.billion-calc.widget
        PRODUCT_NAME: "BillionCalcWidget"
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: BillionCalcCore
        product: BillionCalcCore
