<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>1억 계산기</title>
<style>
:root { color-scheme: light dark; }
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif;
  max-width: 560px;
  margin: 0 auto;
  padding: 80px 24px 48px;
  line-height: 1.7;
  color: #1a1a1a;
  background: #fff;
  text-align: center;
  font-size: 16px;
}
@media (prefers-color-scheme: dark) {
  body { color: #ededed; background: #1c1c1e; }
  h1 { color: #fff; }
  .tagline { color: #aaa; }
  a.btn { background: #f2b82e; color: #1c1c1e; }
}
h1 { font-size: 36px; margin: 0 0 12px; font-weight: 800; }
.tagline { color: #555; font-size: 17px; margin-bottom: 40px; font-weight: 500; }
.icon {
  width: 96px; height: 96px;
  background: linear-gradient(135deg, #f2b82e, #d18f0a);
  border-radius: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 24px;
  box-shadow: 0 8px 24px rgba(241, 184, 46, 0.25);
}
.links { display: flex; flex-direction: column; gap: 12px; max-width: 320px; margin: 0 auto; }
a.btn {
  display: block;
  padding: 14px 24px;
  background: #f2b82e;
  color: #1c1c1e;
  border-radius: 14px;
  font-weight: 600;
  text-decoration: none;
  transition: transform 0.1s;
}
a.btn:hover { transform: translateY(-1px); }
a.text { color: #888; text-decoration: none; font-size: 14px; margin-top: 8px; }
a.text:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="icon">1억</div>
<h1>1억 계산기</h1>
<p class="tagline">월급으로 1억까지, 남은 개월 카운트다운</p>

<div class="links">
  <a class="btn" href="support.html">고객 지원</a>
  <a class="btn" href="privacy.html">개인정보처리방침</a>
</div>

</body>
</html>
